<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그리드 레이아웃 2차원 레이아웃 설계하기</title>
    <style>
        body,
        html {
            height: 100%;
        }

        .container {
            color: white;
            background-color: #c9c9c9;
            padding: 1rem;
            height: 400px;

            display: grid;
            /*grid-template-columns: 100px 100px;*/
            grid-template-columns: 1fr 1fr;
            /*grid-template-columns: minmax(100px, 1fr) minmax(100px, 1fr)*/
            /*grid-template-columns: repeat(2, minmax(100px, 1fr)*/
            /*grid-template-columns: repeat(2, 1fr);*/
            /*grid-template-rows: 100px 150px;*/
            grid-template-rows: 1fr 1fr;
            /*gap은 익스플로러11을 지원하지 않음*/
            /*row-gap: 1rem;*/
            /*column-gap: 1rem;*/

            /*align-items: end;*/
            /*justify-items: start;*/
            /*place-items: end start;*/
            /*grid-template-areas:
                'A C'
                'D B';*/

        }

        .box {
            /*grid-column-start: 1;
            grid-column-end: 3;*/
            grid-column: 1/3;
            /*grid-row-start: 1;
            grid-row-end: 3;
            grid-row: 1/3;*/
            background-color: red;
            /*grid-area: A;*/
        }

        .box:nth-child(2) {
            background-color: orange;
            /*grid-area: B;*/
        }

        .box:nth-child(3) {
            background-color: green;
            /*grid-area: C;*/
        }

        .box:nth-child(4) {
            background-color: blue;
            /*grid-area: D;*/
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
    </div>
</body>

</html>
