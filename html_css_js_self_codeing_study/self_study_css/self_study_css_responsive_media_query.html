<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 웹을 위한 미디어 쿼리 사용하기</title>
    <style>
        @media only screen and (max-width:640px) {
            p {
                color: red;
            }
        }

        @media only screen and (min-width:340px) and (orientation: landscape) {
            p {
                color: blue;
            }
        }
    </style>
</head>

<body>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem, erro! Id dolore officiis commodi est adenim
        earum magnam
        possimus assumenda velit qui dignissimos eos nihil mollitia distinctio
    </p>
</body>

</html>
