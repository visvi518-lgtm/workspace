<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE=edge" />
    <meta name="viewport" content="width=888, initial-scale=1.0">
    <title>CSS 선택자 다루기</title>
    <style>
        h1 {
            color: red;
        }

        dt {
            color: green;
        }

        #pure {
            color: blue;
        }

        .purple {
            color: purple;
        }
    </style>
</head>

<body>
    <h1>h1 tag</h1>
    <p id="pure">p tag</p>
    <dl>
        <dt>CSS</dt>
        <dd class="purple">안녕하세요 css</dd>
    </dl>
</body>

</html>
