<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE-edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼(form)</title>
</head>

<body>
    <form action="" method="">
        <label for="password">패스워드 입력 :</label><input type="password" password="password" />
        <br>
        <label>현재시간 설정 :</label><input type="datetime-local">
        <br>
        <!--아이디만 눌러도 입력요소에서 커서가 깜빡일수 있게-->
        <label for="id">아이디 :</label> <input type="text" id="id" />
        <br>
        <!--암묵적인 방법-->
        <label>아이디 : <input type="text" /> </label>

        <!--fieldset-->
        <fieldset>
            <legend>기본정보</legend>
            <label for="id">아이디 :<input type="text" id="id" </label>
                <label for="ps">비밀번호 :<input type="password" password="password" </label>
        </fieldset>
        <fieldset>
            <legend>옵션정보</legend>
            <label for="fr">가족관계 :<input type="text" pr="pr" </label>
                <label for="bir">생년월일 :<input type="datetime-local" </label>
        </fieldset>
        <textarea></textarea>
        <select>
            <optgroup label="성별">
                <option value="male">남자</option>
                <option value="female">여자</option>
            </optgroup>
        </select>
        <br>
        <!--버튼 태그-->

        <button>안녕</button>
        <!--disabled, readonly-->
        <input type="text" readonly>
        <br>

        <button disabled>안녕</button>
        <input type="text" maxlength="5" placeholder="안녕하세요" />
        <input type="checkbox" checked />



    </form>

</body>

</html>
