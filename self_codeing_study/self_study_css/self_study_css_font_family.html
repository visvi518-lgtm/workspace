<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 속성</title>
    <style>
        h1,
        h3 {
            font-family: dotum;
            font-style: italic;

        }

        h2 {
            font-family: cursive;
            font-size: 18px;
            color: red;
        }

        h4 {
            font-family: fantasy;
            font-weight: 500;
            letter-spacing: 16px;
        }

        h5 {
            font-variant: small-caps;
            color: green;
            text-align: right;

        }

        h6 {
            text-align: justify;
            text-decoration: underline;
            color: rgb(2, 89, 60);
            line-height: 200%;

        }
    </style>
</head>

<body>
    <h1>h1 tag</h1>
    <h2>h2 tag</h2>
    <h3>h3 tag</h3>
    <h4>h4 tag</h4>
    <h5>h5 tag</h5>

        earum magnam
        possimus assumenda velit qui dignissimos eos nihil mollitia distinctio</h6>
</body>

</html>
