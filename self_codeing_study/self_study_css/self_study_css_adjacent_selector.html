<!DOCTYPE html>
<html lang="eko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인접형제선택자_Adjacent_Selector</title>
    <style>
        h1+h2 {
            color: red;
        }

        h2~h4 {
            color: aqua;
        }
    </style>
</head>

<body>
    <h1>h1 tag</h1>
    <h2>h2 tag</h2>
    <h3>h3 tag</h3>
    <h4>h4 tag</h4>

</body>

</html>
