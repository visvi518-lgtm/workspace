<!DOCTYPE html>
<html lang="en">
  <head>
    <title>RandomNumberGuess</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <h1 id="title">Random Number Game<h1>

      <form id="range-form">
        Generate a number between 0 and <input id="range-number" required maxlength="5" type="number" placeholder="enter your number"/>
      <input type="submit">
      </form>
      
      <form id="guess-form">
        Guess the number: <input id="guess-number" required maxlength="5" type="number" placeholder="enter your number"/>
        <input type="submit">

      <h4 id="guess-result"></h3>
      <h3 id="answer"></h3>

      <script src="script.js"></script>
  </body>
</html>
