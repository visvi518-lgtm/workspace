    <body>
        <div id="contentMain">

                <p id="ddayMinus"><span id="dday-count"></span></p>

                    </div>

                    <div id="nameAnd">

                        </div>
                    </div>
                </div>
            </div>
            <br />
            <br />

            <!-- 축하코멘트 -->

                <br />
                <p>서로의 하루를 닮아가며 평생의 여정을 함께 하려 합니다.</p>
                <p>따뜻한 마음으로 축복해주세요.</p>
            </div>
            <br />
            <br />

            <!-- 가족소개 -->
            <div id="familyRelationship">
                <div id="maleFamily">
                    <h3>문영신 박혜희</h3>
                    <p id="maleSon">의 장남 수환</p>
                </div>
                <div id="femaleFamily">
                    <h3>한범석 박숙자</h3>
                    <p id="femaleDauther">의 차녀 승경</p>
                </div>
            </div>

            <!-- 달력 페이지 -->

            <br />
            <br />

            <div id="gallery">갤러리</div>

            <div id="navigate">
                <h2>오시는 길</h2>
                <br />
                <p id="place2">보타닉파크 오키드 홀</p>
                <p id="place3">
                    서울 강서구 마곡중앙5로 6 보타닉푸르지오시티 L층(로비층)
                </p>
                <div id="weddingMapContainer">
                    <div id="weddingMapImage"></div>
                </div>
                <div id="mapButton">
                    <button id="tMap">티맵</button>
                    <button id="naverMap">네이버맵</button>
                    <button id="kakaoMap">카카오맵</button>
                </div>
            </div>
